<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step1ne 龍蝦工作流程</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0f172a; color: #e2e8f0; font-family: 'SF Mono', 'Menlo', monospace; }
  .phase-bar { transition: all 0.5s ease; }
  .log-entry { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .pulse { animation: pulse 1.5s infinite; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot-ok { background: #22c55e; }
  .dot-err { background: #ef4444; }
  .dot-wait { background: #64748b; }
  .phase-done { background: #22c55e; }
  .phase-running { background: #3b82f6; }
  .phase-waiting { background: #334155; }
  .phase-track { background: #1e293b; height: 8px; border-radius: 4px; overflow: hidden; }
  .phase-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .log-scroll { max-height: 400px; overflow-y: auto; }
  .log-scroll::-webkit-scrollbar { width: 6px; }
  .log-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  .card { background: #1e293b; border-radius: 12px; border: 1px solid #334155; }
</style>
</head>
<body class="min-h-screen p-4">

<!-- Header -->
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold">Step1ne 龍蝦工作流程</h1>
  <div class="flex items-center gap-4 text-sm text-slate-400">
    <span id="services"></span>
    <span id="lastUpdate"></span>
  </div>
</div>

<!-- Consultant Lobster -->
<div class="card p-6 mb-4">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-bold">🦞 獵頭顧問龍蝦 — 閉環工作流程</h2>
    <span id="consultant-status" class="text-sm px-3 py-1 rounded-full bg-slate-700"></span>
  </div>

  <!-- Phase Pipeline -->
  <div id="consultant-phases" class="grid grid-cols-6 gap-2 mb-4"></div>

  <!-- Current Task -->
  <div id="consultant-current" class="text-sm text-slate-300 mb-2"></div>
  <div id="consultant-progress" class="text-sm text-slate-400 mb-4"></div>

  <!-- Stats Row -->
  <div id="consultant-stats" class="grid grid-cols-4 gap-3 mb-4"></div>

  <!-- Logs -->
  <div class="border-t border-slate-700 pt-4 mt-2">
    <h3 class="text-sm font-semibold text-slate-400 mb-2">📋 即時工作日誌</h3>
    <div id="consultant-logs" class="log-scroll space-y-1"></div>
  </div>
</div>

<!-- CEO Lobster -->
<div class="card p-6 mb-4">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-bold">🏢 執行長龍蝦 — 監督工作流程</h2>
    <span id="ceo-status" class="text-sm px-3 py-1 rounded-full bg-slate-700"></span>
  </div>

  <!-- Phase Pipeline -->
  <div id="ceo-phases" class="grid grid-cols-5 gap-2 mb-4"></div>

  <!-- Logs -->
  <div class="border-t border-slate-700 pt-4 mt-2">
    <h3 class="text-sm font-semibold text-slate-400 mb-2">📋 通訊日誌</h3>
    <div id="ceo-logs" class="log-scroll space-y-1"></div>
  </div>
</div>

<!-- Quick Stats -->
<div id="quick-stats" class="grid grid-cols-4 gap-3"></div>

<script>
const PHASE_ICONS = { done: '✅', running: '🔄', waiting: '⏳' };
const PHASE_COLORS = { done: 'phase-done', running: 'phase-running', waiting: 'phase-waiting' };

function renderPhases(containerId, phases) {
  const el = document.getElementById(containerId);
  el.innerHTML = phases.map((p, i) => `
    <div class="text-center">
      <div class="text-xs text-slate-400 mb-1">④${i + 1} ${p.name}</div>
      <div class="phase-track">
        <div class="phase-fill ${PHASE_COLORS[p.status]}" style="width: ${p.status === 'done' ? 100 : p.status === 'running' ? 60 : 0}%"></div>
      </div>
      <div class="text-xs mt-1 ${p.status === 'running' ? 'text-blue-400 pulse' : p.status === 'done' ? 'text-green-400' : 'text-slate-500'}">
        ${PHASE_ICONS[p.status]} ${p.status === 'done' ? '完成' : p.status === 'running' ? '進行中' : '等待'}
      </div>
      ${p.detail ? `<div class="text-xs text-slate-500 mt-0.5">${p.detail}</div>` : ''}
    </div>
  `).join('');
}

function renderLogs(containerId, logs) {
  const el = document.getElementById(containerId);
  if (!logs || logs.length === 0) {
    el.innerHTML = '<div class="text-xs text-slate-500">暫無日誌</div>';
    return;
  }
  el.innerHTML = logs.map(l => `
    <div class="log-entry flex gap-2 text-xs py-1 border-b border-slate-800">
      <span class="text-slate-500 shrink-0">${l.time || '--:--'}</span>
      <span class="shrink-0">${l.icon || '📝'}</span>
      <span class="text-slate-300">${l.message || ''}</span>
    </div>
  `).join('');
}

function renderServices(services) {
  const el = document.getElementById('services');
  const items = [
    ['HR API', services.hr_api],
    ['爬蟲', services.crawler],
    ['Chrome', services.chrome_cdp],
  ];
  el.innerHTML = items.map(([name, ok]) =>
    `<span class="status-dot ${ok ? 'dot-ok' : 'dot-err'}"></span> ${name}`
  ).join(' &nbsp; ');
}

function renderStats(stats) {
  const el = document.getElementById('consultant-stats');
  if (!stats || !stats.candidates) return;
  const c = stats.candidates;
  const j = stats.jobs;
  const items = [
    ['總候選人', c.total || 0, '👥'],
    ['今日新增', c.today_new || 0, '🆕'],
    ['今日有 PDF', c.today_with_pdf || 0, '📄'],
    ['招募中職缺', j?.active_jobs || 0, '💼'],
  ];
  el.innerHTML = items.map(([label, val, icon]) => `
    <div class="bg-slate-800 rounded-lg p-3 text-center">
      <div class="text-2xl font-bold">${val}</div>
      <div class="text-xs text-slate-400">${icon} ${label}</div>
    </div>
  `).join('');
}

function renderQuickStats(stats) {
  const el = document.getElementById('quick-stats');
  if (!stats || !stats.candidates) return;
  const pipeline = stats.candidates.pipeline || {};
  const items = [
    ['未開始', pipeline['未開始'] || 0, '⚪'],
    ['聯繫階段', pipeline['聯繫階段'] || 0, '📞'],
    ['面試階段', pipeline['面試階段'] || 0, '🎯'],
    ['人才庫', pipeline['人才庫'] || 0, '📦'],
  ];
  el.innerHTML = items.map(([label, val, icon]) => `
    <div class="card p-3 text-center">
      <div class="text-xl font-bold">${val}</div>
      <div class="text-xs text-slate-400">${icon} ${label}</div>
    </div>
  `).join('');
}

async function refresh() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();

    // Update time
    document.getElementById('lastUpdate').textContent =
      `更新 ${new Date(data.timestamp).toLocaleTimeString('zh-TW')}`;

    // Services
    renderServices(data.services);

    // Consultant Lobster
    const cl = data.consultant_lobster;
    document.getElementById('consultant-status').textContent = cl.phase_label;
    document.getElementById('consultant-status').className =
      `text-sm px-3 py-1 rounded-full ${cl.current_phase > 0 ? 'bg-blue-900 text-blue-300' : 'bg-slate-700 text-slate-400'}`;
    renderPhases('consultant-phases', cl.phases);

    const currentEl = document.getElementById('consultant-current');
    if (cl.current_task) {
      currentEl.innerHTML = `目前：<span class="text-blue-400">Phase ${cl.current_phase}</span> — 正在處理 <span class="text-white font-semibold">${cl.current_task.title || ''}</span> (${cl.current_task.progress || 0}%)`;
    } else if (cl.current_phase > 0) {
      currentEl.innerHTML = `目前：<span class="text-green-400">Phase ${cl.current_phase}</span> — ${cl.phase_label}`;
    } else {
      currentEl.textContent = '💤 閉環尚未啟動';
    }

    const progEl = document.getElementById('consultant-progress');
    progEl.textContent = `職缺進度：${cl.jobs_progress.done}/${cl.jobs_progress.total} 完成`;

    renderLogs('consultant-logs', cl.logs);

    // CEO Lobster
    const ceo = data.ceo_lobster;
    document.getElementById('ceo-status').textContent = ceo.phase_label;
    renderPhases('ceo-phases', ceo.phases);
    renderLogs('ceo-logs', ceo.logs);

    // Stats
    renderStats(data.stats);
    renderQuickStats(data.stats);

  } catch (e) {
    document.getElementById('lastUpdate').textContent = `❌ 連線失敗 ${new Date().toLocaleTimeString('zh-TW')}`;
  }
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
