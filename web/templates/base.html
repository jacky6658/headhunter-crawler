<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HeadHunter Crawler{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 頂部導航列 -->
    <nav class="bg-gray-900 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center space-x-2">
                    <span class="text-xl">&#128269;</span>
                    <span class="font-bold text-lg">HeadHunter Crawler</span>
                </div>
                <div class="flex space-x-1">
                    <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %} px-4 py-2 rounded-md text-sm font-medium hover:bg-gray-700 transition">Dashboard</a>
                    <a href="/tasks" class="nav-link {% if request.path == '/tasks' %}active{% endif %} px-4 py-2 rounded-md text-sm font-medium hover:bg-gray-700 transition">Tasks</a>
                    <a href="/results" class="nav-link {% if request.path == '/results' %}active{% endif %} px-4 py-2 rounded-md text-sm font-medium hover:bg-gray-700 transition">Results</a>
                    <a href="/logs" class="nav-link {% if request.path == '/logs' %}active{% endif %} px-4 py-2 rounded-md text-sm font-medium hover:bg-gray-700 transition">Logs</a>
                    <a href="/settings" class="nav-link {% if request.path == '/settings' %}active{% endif %} px-4 py-2 rounded-md text-sm font-medium hover:bg-gray-700 transition">Settings</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主內容區 -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
